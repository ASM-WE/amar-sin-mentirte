<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amar Sin Mentirte - Blindaje Emocional</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React y ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <!-- Babel para compilar JSX en el cliente sin errores de sintaxis -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Estilos de animación nativos para el ritmo de respiración -->
    <style>
        @keyframes pulse-slow {
            0%, 100% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(1.05); opacity: 1; }
        }
        .animate-pulse-slow {
            animation: pulse-slow 4s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans antialiased p-4">

    <!-- Contenedor Raíz Flexible para Embeds (Crece hacia abajo, sin h-screen fijo) -->
    <div id="root" class="w-full max-w-2xl mx-auto h-auto"></div>

    <!-- Aplicación React Ejecutable -->
    <script type="text/babel">
        const { useState, useEffect } = React;

        // Iconos Lucide integrados manualmente en SVG para máxima estabilidad en local/iframe
        const Icons = {
            Heart: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>,
            Shield: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>,
            Alert: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>,
            Check: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>,
            Message: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        };

        function App() {
            // Persistencia obligatoria en LocalStorage
            const [bitacora, setBitacora] = useState(() => {
                const saved = localStorage.getItem('amar_sin_mentirte_log');
                return saved ? JSON.parse(saved) : [];
            });

            const [activeTab, setActiveTab] = useState('anclaje'); // anclaje | critica
            const [step, setStep] = useState(1); // Control de flujo interno
            
            // Estados - Anclaje de Emergencia
            const [detonante, setDetonante] = useState('');
            const [ansiedad, setAnsiedad] = useState(5);
            const [respiraTexto, setRespiraTexto] = useState('Inhala el aire...');
            const [respiraCuenta, setRespiraCuenta] = useState(4);
            const [ciclo, setCiclo] = useState(1);
            const [pregunta1, setPregunta1] = useState('');
            const [pregunta2, setPregunta2] = useState('');

            // Estados - Blindaje de Críticas
            const [autorCritica, setAutorCritica] = useState('Pareja / Ex');
            const [textoCritica, setTextoCritica] = useState('');
            const [analisisCritica, setAnalisisCritica] = useState(null);

            // Guardar bitácora automáticamente al cambiar
            useEffect(() => {
                localStorage.setItem('amar_sin_mentirte_log', JSON.stringify(bitacora));
            }, [bitacora]);

            // Temporizador biológico de respiración 4-4-4
            useEffect(() => {
                let timer = null;
                if (step === 2) {
                    timer = setInterval(() => {
                        setRespiraCuenta((prev) => {
                            if (prev > 1) return prev - 1;

                            if (respiraTexto === 'Inhala el aire...') {
                                setRespiraTexto('Retén el aire...');
                                return 4;
                            } else if (respiraTexto === 'Retén el aire...') {
                                setRespiraTexto('Exhala despacio...');
                                return 4;
                            } else {
                                if (ciclo >= 3) {
                                    clearInterval(timer);
                                    setStep(3); // Avanzar a cuestionamiento cognitivo
                                    return 4;
                                }
                                setCiclo((c) => c + 1);
                                setRespiraTexto('Inhala el aire...');
                                return 4;
                            }
                        });
                    }, 1000);
                }
                return () => clearInterval(timer);
            }, [step, respiraTexto, ciclo]);

            const manejarInicioAnclaje = (e) => {
                e.preventDefault();
                if (!detonante) return;
                setRespiraTexto('Inhala el aire...');
                setRespiraCuenta(4);
                setCiclo(1);
                setStep(2);
            };

            const salvarAnclajeLog = () => {
                const nuevoItem = {
                    id: Date.now(),
                    fecha: new Date().toLocaleDateString('es-ES'),
                    tipo: 'Anclaje Emocional',
                    resumen: `Contuviste una crisis por "${detonante}". Nivel de urgencia inicial: ${ansiedad}/10.`
                };
                setBitacora([nuevoItem, ...bitacora]);
                // Reset
                setStep(1);
                setDetonante('');
                setPregunta1('');
                setPregunta2('');
                setAnsiedad(5);
            };

            const analizarCriticaAtaque = (e) => {
                e.preventDefault();
                if (!textoCritica) return;

                let hecho = "Esta opinión describe la rigidez, frustración o las heridas no resueltas de la otra persona. No define tu valor real.";
                let limite = "Comprendo tu punto de vista, pero yo sé quién soy y no valido descalificaciones sobre mí.";
                let refugio = "Mi valor no está en juego cuando tú te molestas o criticas. Elijo cuidar mi paz.";

                const t = textoCritica.toLowerCase();
                if (t.includes('culpa') || t.includes('egoista') || t.includes('egoísta')) {
                    hecho = "El emisor intenta sembrar culpa para manipularte porque pusiste un límite saludable.";
                    limite = "Elegir mi propio bienestar y poner este límite no me hace egoísta, protege mi dignidad.";
                    refugia = "Priorizar mi vida y salud mental es mi responsabilidad elemental, no una ofensa para nadie.";
                    refugio = refugia;
                } else if (t.includes('loca') || t.includes('intensa') || t.includes('exagerada')) {
                    hecho = "Están intentando invalidar o patologizar tus emociones para evadir su responsabilidad en el conflicto.";
                    limite = "No voy a permitir que catalogues lo que siento como locura. Mis emociones son legítimas.";
                    refugio = "Mis necesidades de respeto, claridad y verdad son válidas. No soy exagerada por pedirlas.";
                }

                setAnalisisCritica({ hecho, limite, refugio });
                setStep(5); // Paso de visualización de escudo
            };

            const salvarCriticaLog = () => {
                const nuevoItem = {
                    id: Date.now(),
                    fecha: new Date().toLocaleDateString('es-ES'),
                    tipo: 'Filtro de Crítica',
                    resumen: `Desarmaste un ataque de: ${autorCritica}. Refugio interno: "${analisisCritica.refugio}"`
                };
                setBitacora([nuevoItem, ...bitacora]);
                setTextoCritica('');
                setAnalisisCritica(null);
                setStep(1);
            };

            return (
                <div class="bg-white rounded-2xl shadow-md border border-slate-100 overflow-hidden h-auto transition-all duration-300">
                    
                    {/* Encabezado Principal Premium (Terracota Elegante) */}
                    <div class="bg-gradient-to-r from-orange-600 to-amber-700 p-5 text-white text-center">
                        <h1 class="text-xl font-bold tracking-tight md:text-2xl flex items-center justify-center gap-2">
                             Amar Sin Mentirte
                        </h1>
                        <p class="text-orange-100 text-xs mt-1 font-medium">
                            Ecosistema de Autonomía Interna • Tu Espejo de Verdad
                        </p>
                    </div>

                    {/* Selector de Pestañas (Clean UI) */}
                    <div class="flex border-b border-slate-100 bg-slate-50/60">
                        <button 
                            onClick={() => { setActiveTab('anclaje'); setStep(1); }}
                            class={`flex-1 py-3.5 text-xs md:text-sm font-bold border-b-2 transition-all flex items-center justify-center gap-1.5 ${activeTab === 'anclaje' ? 'bg-white text-orange-600 border-orange-600' : 'text-slate-500 border-transparent hover:bg-slate-50'}`}
                        >
                            <Icons.Heart /> Anclaje de Emergencia
                        </button>
                        <button 
                            onClick={() => { setActiveTab('critica'); setStep(1); }}
                            class={`flex-1 py-3.5 text-xs md:text-sm font-bold border-b-2 transition-all flex items-center justify-center gap-1.5 ${activeTab === 'critica' ? 'bg-white text-orange-600 border-orange-600' : 'text-slate-500 border-transparent hover:bg-slate-50'}`}
                        >
                            <Icons.Message /> Blindaje de Críticas
                        </button>
                    </div>

                    {/* Contenido Dinámico */}
                    <div class="p-5 md:p-6">
                        
                        {/* SECCIÓN 1: ANCLAJE DE EMERGENCIA */}
                        {activeTab === 'anclaje' && (
                            <div class="space-y-4">
                                {step === 1 && (
                                    <form onSubmit={manejarInicioAnclaje} class="space-y-4">
                                        <div class="bg-amber-50 border border-amber-200/70 p-4 rounded-xl flex gap-3">
                                            <div class="text-amber-600 shrink-0"><Icons.Alert /></div>
                                            <div>
                                                <h4 class="font-bold text-amber-900 text-xs md:text-sm">¿Urgencia compulsiva de validación externa?</h4>
                                                <p class="text-amber-800 text-[11px] md:text-xs mt-0.5">Usa esta herramienta antes de enviar un mensaje desesperado, rogar o hundirte ante un desinterés. Vamos a anclar tu seguridad.</p>
                                            </div>
                                        </div>

                                        <div class="space-y-1">
                                            <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider">1. ¿Qué detonó tu ansiedad o vacío en este instante?</label>
                                            <select 
                                                value={detonante} 
                                                onChange={(e) => setDetonante(e.target.value)}
                                                class="w-full rounded-xl border border-slate-200 p-3 text-xs md:text-sm focus:border-orange-500 focus:ring-2 focus:ring-orange-100 outline-none bg-white shadow-sm transition-all"
                                                required
                                            >
                                                <option value="">Selecciona la situación relacional...</option>
                                                <option value="Me dejaron en visto / Silencio prolongado">Me dejaron en visto / Silencio prolongado</option>
                                                <option value="Noté frialdad o desinterés en su última interacción">Noté frialdad o desinterés en su última interacción</option>
                                                <option value="Me cancelaron un plan a última hora">Me cancelaron un plan a última hora</option>
                                                <option value="Sentí la necesidad obsesiva de espiar sus redes sociales">Sentí la necesidad obsesiva de espiar sus redes sociales</option>
                                            </select>
                                        </div>

                                        <div class="space-y-1.5">
                                            <div class="flex justify-between text-xs font-bold text-slate-700 uppercase tracking-wider">
                                                <span>2. Nivel de urgencia / Impulso de buscarle</span>
                                                <span class="text-orange-600 bg-orange-50 px-2.5 py-0.5 rounded-md font-extrabold text-xs">{ansiedad} / 10</span>
                                            </div>
                                            <input 
                                                type="range" min="1" max="10" value={ansiedad}
                                                onChange={(e) => setAnsiedad(e.target.value)}
                                                class="w-full h-1.5 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-orange-600"
                                            />
                                        </div>

                                        <button type="submit" class="w-full bg-orange-600 hover:bg-orange-700 text-white font-bold py-3 rounded-xl transition-all text-xs md:text-sm shadow-sm hover:scale-[1.01] active:scale-95">
                                            Iniciar Anclaje de Estabilidad ➔
                                        </button>
                                    </form>
                                )}

                                {step === 2 && (
                                    <div class="text-center py-6 space-y-5 flex flex-col items-center">
                                        <div class="space-y-1">
                                            <span class="text-[10px] font-bold text-orange-600 bg-orange-50 px-3 py-1 rounded-full uppercase tracking-widest">Frenar Sistema de Alerta</span>
                                            <h3 class="text-base font-bold text-slate-800 mt-2">Soberanía de Respiración Regulada (4-4-4)</h3>
                                            <p class="text-slate-500 text-[11px] max-w-sm mx-auto">Tu mente cree que estás en peligro de abandono. Calmemos la biología primero.</p>
                                        </div>

                                        <div class="w-36 h-36 rounded-full bg-orange-50/70 border-2 border-orange-200 flex flex-col items-center justify-center animate-pulse-slow">
                                            <span class="text-orange-800 font-bold text-xs px-2 text-center transition-all duration-300">{respiraTexto}</span>
                                            <span class="text-3xl font-black text-orange-600 mt-1">{respiraCuenta}</span>
                                            <div class="text-[8px] uppercase font-bold text-slate-400 mt-1">Ciclo {ciclo} de 3</div>
                                        </div>
                                    </div>
                                )}

                                {step === 3 && (
                                    <div class="space-y-4">
                                        <div class="bg-slate-50 p-3 rounded-xl border-l-4 border-orange-500 text-xs font-medium text-slate-700">
                                            Tu sistema nervioso se ha enfriado. Es hora de desactivar los engaños racionales de la dependencia.
                                        </div>

                                        <div class="space-y-3">
                                            <div>
                                                <label class="block text-[11px] font-bold text-slate-700 mb-1">Si esta persona decide distanciarse de ti, ¿qué historia catastrófica te cuentas sobre tu valor?</label>
                                                <textarea 
                                                    value={pregunta1} onChange={(e) => setPregunta1(e.target.value)}
                                                    placeholder="Ej: Siento que si no me busca es porque no valgo nada y me voy a quedar sola..."
                                                    class="w-full rounded-xl border border-slate-200 p-3 text-xs h-16 focus:border-orange-500 focus:ring-1 focus:ring-orange-200 outline-none shadow-sm"
                                                />
                                            </div>
                                            <div>
                                                <label class="block text-[11px] font-bold text-slate-700 mb-1">Separando hechos de fantasías: ¿Qué pruebas reales tienes de que sus actos dictan quién eres tú?</label>
                                                <textarea 
                                                    value={pregunta2} onChange={(e) => setPregunta2(e.target.value)}
                                                    placeholder="Ej: Ninguna prueba. Su silencio describe sus bloqueos y su forma de evadir, no merma mi dignidad esencial..."
                                                    class="w-full rounded-xl border border-slate-200 p-3 text-xs h-16 focus:border-orange-500 focus:ring-1 focus:ring-orange-200 outline-none shadow-sm"
                                                />
                                            </div>
                                        </div>

                                        <button 
                                            onClick={() => setStep(4)}
                                            disabled={!pregunta1 || !pregunta2}
                                            class="w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-3 rounded-xl text-xs md:text-sm transition-all disabled:opacity-30 disabled:cursor-not-allowed"
                                        >
                                            Generar Tarjeta de Aviso de Seguridad Interna ✨
                                        </button>
                                    </div>
                                )}

                                {step === 4 && (
                                    <div class="space-y-4">
                                        {/* TARJETA DE AVISO (CORRECCIÓN INTEGRADA) */}
                                        <div class="bg-gradient-to-br from-slate-900 to-slate-800 text-slate-100 p-5 rounded-xl border border-slate-700 space-y-3.5 shadow-md">
                                            <div class="flex justify-between items-center border-b border-slate-700/60 pb-2.5">
                                                <span class="text-[10px] text-orange-400 font-bold uppercase tracking-widest flex items-center gap-1">
                                                    <Icons.Shield /> Tarjeta de Aviso: Protección de Identidad
                                                </span>
                                                <span class="text-[9px] bg-slate-800 px-2 py-0.5 rounded-full text-slate-400 font-medium">Día {bitacora.length + 1}</span>
                                            </div>
                                            
                                            <div class="space-y-3 text-xs md:text-sm leading-relaxed text-slate-300">
                                                <p>
                                                    "Alerta inmediata: Has experimentado un impulso involuntario de validación gatillado por: <span class="text-orange-300 font-semibold italic">"{detonante}"</span>."
                                                </p>
                                                <p>
                                                    "Tu mente intentó convencerte de que este rechazo define lo que vales. Reclama la verdad objetiva: <span class="text-emerald-400 font-bold">Tu seguridad interna es inquebrantable</span>. El ritmo, la inconsistencia o la frialdad de los demás describe sus limitaciones relacionales y heridas, jamás el tamaño de tu dignidad."
                                                </p>
                                                <p class="text-orange-300 border-t border-slate-700/50 pt-2.5 italic font-medium">
                                                    Te avisas y te prometes resguardar tu paz, contener la reacción compulsiva y no mendigar atención en dinámicas que solo ofrecen migajas. Tú eres tu propio hogar firme.
                                                </p>
                                            </div>
                                        </div>

                                        <button onClick={salvarAnclajeLog} class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 rounded-xl transition-all text-xs md:text-sm shadow-sm">
                                            ✓ Registrar en mi Bitácora y Sostener Mi Poder
                                        </button>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* SECCIÓN 2: BLINDAJE ANTE CRÍTICAS */}
                        {activeTab === 'critica' && (
                            <div class="space-y-4">
                                {step === 1 && (
                                    <form onSubmit={analizarCriticaAtaque} class="space-y-4">
                                        <div class="bg-indigo-50 border border-indigo-100 p-4 rounded-xl text-xs">
                                            <p class="text-indigo-900 font-bold">Escudo de Descomposición Rápida</p>
                                            <p class="text-indigo-800 text-[11px] mt-0.5">La crítica ajena solo daña una autoestima frágil que la asume como verdad. Este filtro separa la basura emocional externa de tu autoconcepto.</p>
                                        </div>

                                        <div class="space-y-1">
                                            <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider">¿Quién emitió el juicio o crítica?</label>
                                            <select 
                                                value={autorCritica} onChange={(e) => setAutorCritica(e.target.value)}
                                                class="w-full rounded-xl border border-slate-200 p-3 text-xs md:text-sm bg-white outline-none shadow-sm"
                                            >
                                                <option value="Pareja / Ex">Pareja / Ex</option>
                                                <option value="Familiar Directo">Familiar Directo</option>
                                                <option value="Amistad / Entorno Social">Amistad / Entorno Social</option>
                                            </select>
                                        </div>

                                        <div class="space-y-1">
                                            <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider">Escribe textualmente qué te dijeron o interpretaste que hiere tu valor:</label>
                                            <textarea 
                                                value={textoCritica} onChange={(e) => setTextoCritica(e.target.value)}
                                                placeholder="Ej: Me reclamó que soy una egoísta insensible por no dejar mis planes para resolver sus apuros..."
                                                class="w-full rounded-xl border border-slate-200 p-3 text-xs md:text-sm h-20 focus:border-orange-500 outline-none shadow-sm"
                                                required
                                            />
                                        </div>

                                        <button type="submit" class="w-full bg-orange-600 hover:bg-orange-700 text-white font-bold py-3 rounded-xl shadow-sm text-xs md:text-sm transition-all">
                                            Desarmar Ataque Emocional ➔
                                        </button>
                                    </form>
                                )}

                                {step === 5 && analisisCritica && (
                                    <div class="space-y-4">
                                        <div class="flex justify-between items-center">
                                            <h3 class="font-bold text-slate-800 text-xs md:text-sm">Análisis del Escudo Protector</h3>
                                            <button onClick={() => setStep(1)} class="text-xs text-orange-600 hover:underline font-bold">🔄 Filtrar otra frase</button>
                                        </div>

                                        <div class="space-y-3">
                                            <div class="bg-slate-50 p-3 border border-slate-200 rounded-xl">
                                                <span class="text-[9px] uppercase font-bold text-slate-400 block tracking-wider">Ataque original de {autorCritica}:</span>
                                                <p class="text-xs text-slate-600 italic mt-0.5">"{textoCritica}"</p>
                                            </div>

                                            <div class="bg-orange-50/70 p-3.5 border border-orange-100 rounded-xl">
                                                <span class="text-[10px] uppercase font-bold text-orange-700 tracking-wider block">1. Separación de Proyecciones (La Verdad):</span>
                                                <p class="text-xs text-slate-700 mt-1 font-medium leading-relaxed">{analisisCritica.hecho}</p>
                                            </div>

                                            <div class="bg-emerald-50/70 p-3.5 border border-emerald-100 rounded-xl">
                                                <span class="text-[10px] uppercase font-bold text-emerald-700 tracking-wider block">2. Tu Respuesta Asertiva (Límite):</span>
                                                <p class="text-xs text-slate-800 font-mono bg-white p-2 rounded border border-emerald-100 mt-1 font-medium">"{analisisCritica.limite}"</p>
                                            </div>

                                            <div class="bg-indigo-50/70 p-3.5 border border-indigo-100 rounded-xl">
                                                <span class="text-[10px] uppercase font-bold text-indigo-700 tracking-wider block">3. Tu Refugio Interno (Seguridad Estable):</span>
                                                <p class="text-xs text-indigo-950 font-bold mt-1">"{analisisCritica.refugio}"</p>
                                            </div>
                                        </div>

                                        <button onClick={salvarCriticaLog} class="w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-3 rounded-xl text-xs md:text-sm transition-all shadow-md">
                                            ✓ Registrar Victoria de Resiliencia en Bitácora
                                        </button>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* BITÁCORA HISTÓRICA COMPARTIDA DE LOS 30 DÍAS */}
                        <div class="mt-6 pt-5 border-t border-slate-100">
                            <div class="flex justify-between items-center mb-3">
                                <h3 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest flex items-center gap-1.5">
                                    ✨ Historial de Soberanía Relacional ({bitacora.length} Días)
                                </h3>
                                {bitacora.length > 0 && (
                                    <button 
                                        onClick={() => { if(confirm("¿Deseas reiniciar tu avance histórico?")) { setBitacora([]); localStorage.removeItem('amar_sin_mentirte_log'); } }}
                                        class="text-[9px] text-slate-400 hover:text-red-500 font-bold transition-colors"
                                    >
                                        Reiniciar Todo
                                    </button>
                                )}
                            </div>

                            {bitacora.length === 0 ? (
                                <div class="text-center p-5 bg-slate-50 rounded-xl border border-dashed border-slate-200">
                                    <p class="text-xs text-slate-400 font-medium">No hay registros hoy. Los hitos de tu seguridad interna se guardarán aquí de forma privada.</p>
                                </div>
                            ) : (
                                <div class="space-y-2 max-h-48 overflow-y-auto pr-1">
                                    {bitacora.map((item) => (
                                        <div key={item.id} class="bg-slate-50/80 border border-slate-200 p-2.5 rounded-xl flex justify-between items-start gap-4 transition-colors hover:bg-slate-50">
                                            <div class="space-y-1">
                                                <div class="flex items-center gap-1.5">
                                                    <span class="text-[9px] font-extrabold px-2 py-0.5 rounded-full bg-white border border-slate-200 text-slate-700 shadow-sm">{item.tipo}</span>
                                                    <span class="text-[9px] text-slate-400 font-semibold">{item.fecha}</span>
                                                </div>
                                                <p class="text-xs text-slate-600 leading-relaxed font-medium">{item.resumen}</p>
                                            </div>
                                            <span class="text-emerald-500 font-bold text-xs shrink-0 mt-0.5"><Icons.Check /></span>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>

                    </div>

                    {/* Footer Estable */}
                    <div class="bg-slate-50 border-t border-slate-100 px-5 py-3 text-center text-[10px] text-slate-400 font-medium">
                        "Amar Sin Mentirte" • Eres la dueña absoluta de tu paz y estabilidad.
                    </div>

                </div>
            );
        }

        // Renderizado definitivo en el elemento raíz
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
